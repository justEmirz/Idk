<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S3 Key Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            color: #999;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-btn:hover:not(.active) {
            color: #666;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: slideUp 0.3s ease-out;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"],
        input[type="number"],
        input[type="email"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="number"]:focus,
        input[type="email"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle input {
            padding-right: 40px;
        }

        .toggle-eye {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
            font-size: 18px;
            user-select: none;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            border-color: #d0d0d0;
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-logout {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            margin-top: 10px;
        }

        .btn-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(245, 87, 108, 0.4);
        }

        .result-section {
            margin-top: 30px;
        }

        .result-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 10px;
            min-height: 80px;
            display: none;
        }

        .result-box.show {
            display: block;
            animation: slideUp 0.3s ease-out;
        }

        .result-label {
            color: #666;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .result-content {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-text {
            flex: 1;
            color: #333;
            font-size: 16px;
            font-weight: 600;
            word-break: break-all;
            font-family: 'Courier New', monospace;
        }

        .copy-indicator {
            color: #22c55e;
            font-size: 12px;
            font-weight: 600;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .copy-indicator.show {
            display: block;
            opacity: 1;
        }

        .status-message {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            display: none;
        }

        .status-message.show {
            display: block;
        }

        .status-error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .status-success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .status-loading {
            background: #eef;
            color: #33c;
            border: 1px solid #ccf;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(51, 51, 204, 0.2);
            border-top-color: #33c;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .user-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #e0e0e0;
        }

        .user-info p {
            color: #666;
            font-size: 14px;
            margin: 5px 0;
        }

        .user-info strong {
            color: #333;
        }

        .requirements {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .requirements h4 {
            color: #333;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .requirement-item {
            color: #666;
            font-size: 12px;
            margin: 4px 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .requirement-check {
            display: inline-block;
            width: 14px;
            height: 14px;
            text-align: center;
            font-size: 11px;
            font-weight: bold;
        }

        .requirement-check.met {
            color: #22c55e;
        }

        .requirement-check.unmet {
            color: #e11d48;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 24px;
            }

            button {
                padding: 12px 15px;
                font-size: 14px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔑 Key Generator</h1>
            <p>Secure Key Generation Platform</p>
        </div>

        <!-- Auth Section -->
        <div id="authSection">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Tab -->
            <div id="login" class="tab-content active">
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input 
                        type="text" 
                        id="loginUsername" 
                        placeholder="Enter your username"
                    >
                </div>

                <div class="form-group password-toggle">
                    <label for="loginPassword">Password</label>
                    <input 
                        type="password" 
                        id="loginPassword" 
                        placeholder="Enter your password"
                    >
                    <span class="toggle-eye" onclick="togglePassword('loginPassword')">👁️</span>
                </div>

                <button class="btn-primary" onclick="login()" style="width: 100%; margin-top: 20px;">
                    Login
                </button>

                <div class="status-message" id="loginStatus"></div>
            </div>

            <!-- Register Tab -->
            <div id="register" class="tab-content">
                <div class="form-group">
                    <label for="regUsername">Username</label>
                    <input 
                        type="text" 
                        id="regUsername" 
                        placeholder="Choose a username"
                        oninput="validateUsername()"
                    >
                </div>

                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input 
                        type="email" 
                        id="regEmail" 
                        placeholder="Enter your email"
                    >
                </div>

                <div class="form-group password-toggle">
                    <label for="regPassword">Password</label>
                    <input 
                        type="password" 
                        id="regPassword" 
                        placeholder="Create a strong password"
                        oninput="validatePassword()"
                    >
                    <span class="toggle-eye" onclick="togglePassword('regPassword')">👁️</span>
                </div>

                <div class="form-group password-toggle">
                    <label for="regConfirm">Confirm Password</label>
                    <input 
                        type="password" 
                        id="regConfirm" 
                        placeholder="Confirm your password"
                        oninput="validatePassword()"
                    >
                    <span class="toggle-eye" onclick="togglePassword('regConfirm')">👁️</span>
                </div>

                <div class="requirements">
                    <h4>Password Requirements:</h4>
                    <div class="requirement-item">
                        <span class="requirement-check unmet" id="check-length">✗</span>
                        <span>At least 8 characters</span>
                    </div>
                    <div class="requirement-item">
                        <span class="requirement-check unmet" id="check-upper">✗</span>
                        <span>One uppercase letter</span>
                    </div>
                    <div class="requirement-item">
                        <span class="requirement-check unmet" id="check-lower">✗</span>
                        <span>One lowercase letter</span>
                    </div>
                    <div class="requirement-item">
                        <span class="requirement-check unmet" id="check-number">✗</span>
                        <span>One number</span>
                    </div>
                    <div class="requirement-item">
                        <span class="requirement-check unmet" id="check-special">✗</span>
                        <span>One special character (!@#$%^&*)</span>
                    </div>
                    <div class="requirement-item">
                        <span class="requirement-check unmet" id="check-match">✗</span>
                        <span>Passwords match</span>
                    </div>
                </div>

                <button class="btn-primary" onclick="register()" style="width: 100%; margin-top: 20px;">
                    Create Account
                </button>

                <div class="status-message" id="registerStatus"></div>
            </div>
        </div>

        <!-- App Section (Hidden until logged in) -->
        <div id="appSection" style="display: none;">
            <div class="user-info">
                <p>Welcome, <strong id="currentUsername"></strong>! 👋</p>
                <p style="font-size: 12px; margin-top: 8px;" id="userEmail"></p>
            </div>

            <div class="form-group">
                <label for="daysInput">Validity Period (days)</label>
                <input 
                    type="number" 
                    id="daysInput" 
                    value="2" 
                    min="1" 
                    max="365"
                    placeholder="Enter number of days"
                >
            </div>

            <div class="button-group">
                <button class="btn-primary" id="generateBtn" onclick="getKey()">
                    Generate Key
                </button>
                <button class="btn-secondary" id="copyBtn" onclick="copyToClipboard()" disabled>
                    📋 Copy
                </button>
            </div>

            <div class="status-message" id="statusMessage"></div>

            <div class="result-section">
                <div class="result-box" id="resultBox">
                    <div class="result-label">Generated Key</div>
                    <div class="result-content">
                        <div class="result-text" id="result"></div>
                        <div class="copy-indicator" id="copyIndicator">Copied!</div>
                    </div>
                </div>
            </div>

            <button class="btn-logout" onclick="logout()" style="width: 100%;">
                🚪 Logout
            </button>
        </div>
    </div>

    <script>
        let currentKey = '';
        let currentUser = null;
        const users = JSON.parse(localStorage.getItem('users')) || {};
        const loggedInUser = localStorage.getItem('loggedInUser');

        // Check if user is already logged in
        if (loggedInUser) {
            currentUser = JSON.parse(loggedInUser);
            showAppSection();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab).classList.add('active');
            
            // Clear status messages
            document.getElementById('loginStatus').innerHTML = '';
            document.getElementById('registerStatus').innerHTML = '';
        }

        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const eye = event.target;
            
            if (field.type === 'password') {
                field.type = 'text';
                eye.textContent = '👁️‍🗨️';
            } else {
                field.type = 'password';
                eye.textContent = '👁️';
            }
        }

        function validateUsername() {
            const username = document.getElementById('regUsername').value;
            const isValid = username.length >= 3 && /^[a-zA-Z0-9_]+$/.test(username);
            return isValid;
        }

        function validatePassword() {
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;

            const checks = {
                length: password.length >= 8,
                upper: /[A-Z]/.test(password),
                lower: /[a-z]/.test(password),
                number: /[0-9]/.test(password),
                special: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password),
                match: password === confirm && password.length > 0
            };

            Object.entries(checks).forEach(([key, value]) => {
                const elem = document.getElementById(`check-${key}`);
                if (value) {
                    elem.classList.remove('unmet');
                    elem.classList.add('met');
                    elem.textContent = '✓';
                } else {
                    elem.classList.remove('met');
                    elem.classList.add('unmet');
                    elem.textContent = '✗';
                }
            });

            return Object.values(checks).every(v => v);
        }

        function register() {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            const statusEl = document.getElementById('registerStatus');

            // Validation
            if (!username || !email || !password || !confirm) {
                showStatusMessage(statusEl, 'Please fill all fields', 'error');
                return;
            }

            if (!validateUsername()) {
                showStatusMessage(statusEl, 'Username must be 3+ characters, alphanumeric and underscores only', 'error');
                return;
            }

            if (!validatePassword()) {
                showStatusMessage(statusEl, 'Password does not meet requirements', 'error');
                return;
            }

            if (users[username]) {
                showStatusMessage(statusEl, 'Username already exists', 'error');
                return;
            }

            // Hash password (simple hash for demo - use bcrypt in production!)
            const hashedPassword = btoa(password);

            // Save user
            users[username] = {
                email: email,
                password: hashedPassword,
                created: new Date().toISOString()
            };
            localStorage.setItem('users', JSON.stringify(users));

            showStatusMessage(statusEl, 'Account created successfully! Please login.', 'success');
            setTimeout(() => {
                document.querySelector('[onclick="switchTab(\'login\')"]').click();
            }, 1500);
        }

        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const statusEl = document.getElementById('loginStatus');

            if (!username || !password) {
                showStatusMessage(statusEl, 'Please enter username and password', 'error');
                return;
            }

            const user = users[username];
            if (!user || user.password !== btoa(password)) {
                showStatusMessage(statusEl, 'Invalid username or password', 'error');
                return;
            }

            // Login successful
            currentUser = { username, email: user.email };
            localStorage.setItem('loggedInUser', JSON.stringify(currentUser));
            showStatusMessage(statusEl, 'Login successful!', 'success');
            
            setTimeout(() => {
                showAppSection();
            }, 1000);
        }

        function logout() {
            localStorage.removeItem('loggedInUser');
            currentUser = null;
            currentKey = '';
            document.getElementById('authSection').style.display = 'block';
            document.getElementById('appSection').style.display = 'none';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('statusMessage').innerHTML = '';
        }

        function showAppSection() {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'block';
            document.getElementById('currentUsername').textContent = currentUser.username;
            document.getElementById('userEmail').textContent = currentUser.email;
        }

        async function getKey() {
            const daysInput = document.getElementById('daysInput');
            const days = parseInt(daysInput.value) || 2;
            
            if (days < 1 || days > 365) {
                showStatusMessage(document.getElementById('statusMessage'), 'Please enter a value between 1 and 365 days', 'error');
                return;
            }

            const generateBtn = document.getElementById('generateBtn');
            const resultBox = document.getElementById('resultBox');
            const statusMessage = document.getElementById('statusMessage');

            generateBtn.disabled = true;
            showStatusMessage(statusMessage, `<span class="spinner"></span>Generating key...`, 'loading');
            resultBox.classList.remove('show');

            try {
                const res = await fetch('https://s3-hacks-get-key-production.up.railway.app/generate_key.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ days: days })
                });

                if (!res.ok) {
                    throw new Error(`Server returned ${res.status}`);
                }

                const data = await res.json();

                if (data.key) {
                    currentKey = data.key;
                    document.getElementById('result').innerText = data.key;
                    resultBox.classList.add('show');
                    showStatusMessage(statusMessage, 'Key generated successfully!', 'success');
                    document.getElementById('copyBtn').disabled = false;
                } else {
                    throw new Error('No key received from server');
                }
            } catch (error) {
                console.error('Error:', error);
                showStatusMessage(statusMessage, `Failed to generate key: ${error.message}`, 'error');
                document.getElementById('copyBtn').disabled = true;
            } finally {
                generateBtn.disabled = false;
            }
        }

        function copyToClipboard() {
            if (!currentKey) return;

            navigator.clipboard.writeText(currentKey).then(() => {
                const copyIndicator = document.getElementById('copyIndicator');
                copyIndicator.classList.add('show');
                setTimeout(() => {
                    copyIndicator.classList.remove('show');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
                showStatusMessage(document.getElementById('statusMessage'), 'Failed to copy to clipboard', 'error');
            });
        }

        function showStatusMessage(element, message, type) {
            element.innerHTML = message;
            element.className = `status-message show status-${type}`;

            if (type !== 'loading') {
                setTimeout(() => {
                    element.classList.remove('show');
                }, 4000);
            }
        }

        // Allow Enter key
        document.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                if (document.getElementById('authSection').style.display !== 'none') {
                    if (document.getElementById('login').classList.contains('active')) {
                        login();
                    } else if (document.getElementById('register').classList.contains('active')) {
                        register();
                    }
                } else {
                    getKey();
                }
            }
        });
    </script>
</body>
</html>
